{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card-modern shadow-sm p-4 text-center">
            
            <h4 class="fw-bold mb-2">🔐 התחברות למערכת</h4>
            <p class="text-muted small mb-4">הזן את פרטי החשבון שלך כדי לנהל את המשימות</p>
            
            <form method="POST">
                <input type="email" name="email" class="form-control mb-3" placeholder="כתובת אימייל" required autocomplete="email">
                <input type="password" name="password" class="form-control mb-4" placeholder="סיסמה" required autocomplete="current-password">
                
                <button type="submit" class="btn btn-dark w-100 py-2 mb-3">התחבר עכשיו</button>
            </form>
            
            <div class="small text-muted border-top pt-3 mt-2">
                אין לך חשבון עדיין? <a href="/register" class="text-primary text-decoration-none fw-semibold">פתח חשבון בחינם</a>
            </div>
            
        </div>
    </div>
</div>

{% endblock %}
