{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-4">
        <div class="card-modern shadow p-4 text-center" style="border-top: 4px solid var(--brand-blue); animation: fadeInUp 0.5s var(--ease);">

            <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle"
                 style="width: 56px; height: 56px; background: var(--brand-blue-light);">
                <i class="bi bi-shield-lock-fill fs-4" style="color: var(--brand-blue);"></i>
            </div>

            <h4 class="fw-bold mb-1">התחברות למערכת</h4>
            <p class="text-muted small mb-4">הזן את פרטי החשבון שלך כדי לנהל את המשימות</p>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="input-group mb-3">
                    <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="שם משתמש" required autocomplete="username" autofocus>
                </div>
                <div class="input-group mb-4">
                    <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="סיסמה" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold">
                    <i class="bi bi-box-arrow-in-left"></i> התחבר עכשיו
                </button>
            </form>

            <div class="small text-muted border-top pt-3 mt-2 d-flex justify-content-between">
                <a href="/reset_password" class="text-muted text-decoration-none">שכחת סיסמה?</a>
                <a href="/register" class="text-primary text-decoration-none fw-semibold">פתח חשבון חדש</a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
