{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-modern shadow-sm p-4">
            
            <h4 class="fw-bold mb-3">
                {% if user %}
                    ✏️ עריכת משתמש: {{ user.username }}
                {% else %}
                    ➕ יצירת משתמש חדש במערכת
                {% endif %}
            </h4>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small">שם משתמש</label>
                    <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" required>
                    {% if user and user.username == 'mv' %}
                        <div class="form-text text-danger">אין לשנות שם משתמש זה כדי לא לאבד הרשאות מנהל.</div>
                    {% endif %}
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted small">כתובת אימייל</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted small">
                        סיסמה 
                        {% if user %} <span class="text-warning">(השאר ריק אם אינך רוצה לשנות)</span> {% endif %}
                    </label>
                    <input type="text" name="password" class="form-control" placeholder="{% if user %}הזן סיסמה חדשה...{% else %}הזן סיסמה התחלתית...{% endif %}" {% if not user %}required{% endif %}>
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="/admin" class="btn btn-outline-secondary">ביטול וחזרה</a>
                    <button type="submit" class="btn btn-primary fw-bold">
                        {% if user %} שמור שינויים {% else %} צור משתמש {% endif %}
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>

{% endblock %}
