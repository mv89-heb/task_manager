<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Title -->
    <title>מערכת ניהול משימות</title>

    <!-- Custom Styles -->
    <style>
        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            background: #111827;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #374151;
        }

        .sidebar a {
            padding: 14px 20px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }

        /* Content Area */
        .content {
            margin-right: 240px;
            padding: 30px;
        }

        /* Page Title */
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Card (modern) */
        .card-modern {
            border: none;
            border-radius: 12px;
            background: #ffffff;
        }

        /* Navbar */
        .topbar {
            background: white;
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .content {
                margin-right: 0;
            }
        }
    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        📊 ניהול משימות
    </div>

    <a href="/">🏠 משימות</a>
    <a href="/dashboard">📈 דשבורד</a>
</div>

<!-- Main Content -->
<div class="content">

    <!-- Topbar -->
    <div class="topbar shadow-sm d-flex justify-content-between align-items-center">
        <div class="fw-semibold">מערכת ניהול משימות</div>
        <div class="text-muted small">Flask SaaS UI</div>
    </div>

    <!-- Dynamic Content -->
    {% block content %}{% endblock %}

</div>

</body>
</html>
