<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>מערכת ניהול משימות</title>
    <style>
        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
        }
        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            background: #111827;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #374151;
            margin-bottom: 10px;
        }
        .sidebar a {
            padding: 14px 20px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
            border-right: 4px solid transparent;
        }
        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }
        /* העיצוב החדש לעמוד הפעיל */
        .sidebar a.active {
            background: #1f2937;
            color: white;
            border-right: 4px solid #3b82f6;
            font-weight: 600;
        }
        .content { margin-right: 240px; padding: 30px; }
        .card-modern { border: none; border-radius: 12px; background: #ffffff; }
        .topbar { background: white; border-radius: 12px; padding: 10px 20px; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .content { margin-right: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        🚀 TaskManager
    </div>
    <a href="/" class="{% if request.endpoint == 'tasks.index' %}active{% endif %}">🏠 ניהול משימות</a>
    <a href="/dashboard" class="{% if request.endpoint == 'dashboard.dashboard' %}active{% endif %}">📈 דשבורד מנהלים</a>
</div>

<div class="content">
    <div class="topbar shadow-sm d-flex justify-content-between align-items-center">
        <div class="fw-semibold">סביבת עבודה</div>
        <div class="text-muted small">גירסה 1.0</div>
    </div>
    {% block content %}{% endblock %}
</div>

</body>
</html>
