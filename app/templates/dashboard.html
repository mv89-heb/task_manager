{% extends "base.html" %}
{% block content %}

<div class="row g-4">

<div class="col-md-4">
<div class="card-modern p-4 shadow-sm text-center">
<h6>סה"כ משימות</h6>
<h2>{{total}}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-modern p-4 shadow-sm text-center">
<h6>הושלמו</h6>
<h2 class="text-success">{{done}}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-modern p-4 shadow-sm text-center">
<h6>פתוחות</h6>
<h2 class="text-warning">{{total - done}}</h2>
</div>
</div>

<div class="col-12">
<div class="card-modern p-4 shadow-sm">
<h6 class="mb-3">📊 גרף</h6>
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById("chart"), {
type: 'doughnut',
data: {
labels: ['פתוחות','הושלמו'],
datasets: [{
data: [{{total - done}}, {{done}}],
backgroundColor: ['#f59e0b','#22c55e']
}]
}
});
</script>

{% endblock %}
